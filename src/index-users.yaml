version: 0.8
index_id: users

doc_mapping:
  mode: dynamic
  field_mappings:
    - name: id
      type: u64
      fast: true
    - name: name
      type: text
      tokenizer: default
      record: position
    - name: email
      type: text
      tokenizer: raw
      fast: true
    - name: address
      type: text
      tokenizer: default
      record: position
    - name: signed_up_at
      type: datetime
      input_formats: [rfc3339]
      fast_precision: seconds
      fast: true
  timestamp_field: signed_up_at

search_settings:
  default_search_fields: [name, email, address]

indexing_settings:
  commit_timeout_secs: 10
