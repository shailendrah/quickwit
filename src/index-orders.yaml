version: 0.8
index_id: orders

doc_mapping:
  mode: dynamic
  field_mappings:
    - name: id
      type: u64
      fast: true
    - name: user_id
      type: u64
      fast: true
    - name: amount
      type: f64
      fast: true
    - name: status
      type: text
      tokenizer: raw
      fast: true
    - name: placed_at
      type: datetime
      input_formats: [rfc3339]
      fast_precision: seconds
      fast: true
  timestamp_field: placed_at

search_settings:
  default_search_fields: [status]

indexing_settings:
  commit_timeout_secs: 10
