version: 0.8
index_id: articles

doc_mapping:
  mode: dynamic
  field_mappings:
    - name: id
      type: u64
      fast: true
    - name: title
      type: text
      tokenizer: default
      record: position
    - name: author
      type: text
      tokenizer: raw
      fast: true
    - name: published_at
      type: datetime
      input_formats: [rfc3339]
      fast_precision: seconds
      fast: true
    - name: body
      type: text
      tokenizer: default
      record: position
    - name: tags
      type: array<text>
      tokenizer: raw
      fast: true
    - name: category
      type: text
      tokenizer: raw
      fast: true
    - name: source
      type: text
      tokenizer: raw
      fast: true
    - name: language
      type: text
      tokenizer: raw
      fast: true
    - name: url
      type: text
      tokenizer: raw
    - name: word_count
      type: u64
      fast: true
  timestamp_field: published_at

search_settings:
  default_search_fields: [title, body, tags]

indexing_settings:
  commit_timeout_secs: 10
