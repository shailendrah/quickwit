version: 0.8
index_id: products

doc_mapping:
  mode: dynamic
  field_mappings:
    - name: id
      type: u64
      fast: true
    - name: name
      type: text
      tokenizer: default
      record: position
    - name: category
      type: text
      tokenizer: raw
      fast: true
    - name: price
      type: f64
      fast: true

search_settings:
  default_search_fields: [name, category]

indexing_settings:
  commit_timeout_secs: 10
